name: Release

# Trigger from the GitHub UI: Actions → Release → Run workflow.
# Bumps the version, tags, publishes to npm, and creates a GitHub Release.
#
# npm auth uses trusted publishing (OIDC) — configure it once on npmjs.com:
#   package Settings → Trusted Publisher → GitHub Actions
#   owner: braeden, repo: eslint-plugin-parallelize, workflow: release.yml
# No NPM_TOKEN secret needed. (If you'd rather use a token, add a granular
# automation token as the NPM_TOKEN secret and set
# NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} on the publish step.)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  id-token: write # npm trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing requires npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - name: Bump version and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.bump }}" -m "release: v%s"
          git push --follow-tags
      - run: npm publish
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v$(node -p "require('./package.json').version")" --generate-notes
